$:
  vscode:
    - docker:
        image: docker.cnb.cool/examples/language/python-3:3.10
      runner:
        tags: cnb:arch:arm64:v8 # arm64:v8    amd64
        cpus: 8
      services:
        - vscode
        - docker
      volumes:
        - /root/.cache/pip:copy-on-write
        - /root/.local/share/uv:copy-on-write
      stages:
        - name: Install dependencies
          script: |
            pip install uv
            uv sync
        - name: Run dev server
          script: uv run python main.py

master:
  push:
    # filter:
    #   commit:
    #     message:
    #       contains: "[打包]"
    - stages:
      - name: Build Linux AMD64
        image: python:3.10
        runner:
          tags: cnb:arch:amd64
          cpus: 8
        volumes:
          - /root/.cache/pip:copy-on-write
        script: |
          echo "========================================"
          echo "Building for Linux AMD64..."
          echo "========================================"
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --onefile --clean --name dfont-linux-amd64 --add-data "web:web" main.py
          echo ""
          echo "Build completed!"
          ls -lh dist/
          echo ""
          echo "Packaging artifact..."
          cd dist
          zip ../dfont-linux-amd64.zip dfont-linux-amd64
          cd ..
          echo ""
          echo "Uploading to CNB artifacts..."
          mkdir -p /cnb/artifacts
          cp dfont-linux-amd64.zip /cnb/artifacts/
          ls -lh /cnb/artifacts/

      - name: Build Linux ARM64
        image: python:3.10
        runner:
          tags: cnb:arch:arm64:v8
          cpus: 8
        volumes:
          - /root/.cache/pip:copy-on-write
        script: |
          echo "========================================"
          echo "Building for Linux ARM64..."
          echo "========================================"
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --onefile --clean --name dfont-linux-arm64 --add-data "web:web" main.py
          echo ""
          echo "Build completed!"
          ls -lh dist/
          echo ""
          echo "Packaging artifact..."
          cd dist
          zip ../dfont-linux-arm64.zip dfont-linux-arm64
          cd ..
          echo ""
          echo "Uploading to CNB artifacts..."
          mkdir -p /cnb/artifacts
          cp dfont-linux-arm64.zip /cnb/artifacts/
          ls -lh /cnb/artifacts/

      - name: Build Windows
        image: docker.cnb.cool/examples/language/python-3:3.10
        runner:
          cpus: 8
        volumes:
          - /root/.cache/pip:copy-on-write
        script: |
          echo "========================================"
          echo "System Information"
          echo "========================================"
          uname -a
          echo ""
          echo "Python version:"
          python --version
          echo ""
          echo "========================================"
          echo "Building for Windows..."
          echo "========================================"
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --onefile --clean --name dfont.exe --add-data="web;web" main.py
          echo ""
          echo "Build completed!"
          ls -lh dist/
          echo ""
          echo "Packaging artifact..."
          cd dist
          zip ../dfont-windows.zip dfont.exe
          cd ..
          echo ""
          echo "Uploading to CNB artifacts..."
          mkdir -p /cnb/artifacts
          cp dfont-windows.zip /cnb/artifacts/
          ls -lh /cnb/artifacts/