  build-windows:
    if: contains(github.event.head_commit.message, '打包') || contains(github.event.head_commit.message, 'build') || contains(github.event.head_commit.message, 'release') || github.ref_type == 'tag'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --clean --name dfont.exe --add-data "web;web" main.py

      - name: Package artifact
        run: |
          cd dist && Compress-Archive -Path dfont.exe -DestinationPath dfont-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfont-windows
          path: dist/dfont-windows.zip

  build-macos:
    if: contains(github.event.head_commit.message, '打包') || contains(github.event.head_commit.message, 'build') || contains(github.event.head_commit.message, 'release') || github.ref_type == 'tag'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --clean --name dfont-macos --add-data "web:web" main.py

      - name: Package artifact
        run: |
          cd dist && zip dfont-macos.zip dfont-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfont-macos
          path: dist/dfont-macos.zip

  create-release:
    needs: [build-linux-amd64, build-linux-arm64, build-windows, build-macos]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dfont-linux-amd64/dfont-linux-amd64.zip
            artifacts/dfont-linux-arm64/dfont-linux-arm64.zip
            artifacts/dfont-windows/dfont-windows.zip
            artifacts/dfont-macos/dfont-macos.zip
          generate_release_notes: true
