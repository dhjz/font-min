name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --clean --name dfont-linux-amd64 --add-data "web:web" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfont-linux-amd64
          path: dist/dfont-linux-amd64

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace arm64v8/python:3.10-slim bash -c "
            pip install --upgrade pip &&
            pip install -r requirements.txt &&
            pip install pyinstaller &&
            pyinstaller --onefile --clean --name dfont-linux-arm64 --add-data 'web:web' main.py
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfont-linux-arm64
          path: dist/dfont-linux-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --clean --name dfont.exe --add-data "web;web" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfont-windows
          path: dist/dfont.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --clean --name dfont-macos --add-data "web:web" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfont-macos
          path: dist/dfont-macos

  create-release:
    needs: [build-linux-amd64, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dfont-linux-amd64/dfont-linux-amd64
            artifacts/dfont-linux-arm64/dfont-linux-arm64
            artifacts/dfont-windows/dfont.exe
            artifacts/dfont-macos/dfont-macos
          generate_release_notes: true
